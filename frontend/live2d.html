<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>OtakuCopilot — Live2D</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #0d1117; font-family: 'Noto Sans SC', sans-serif; }

    #live2d-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }

    /* ── Subtitle overlay ── */
    #subtitle-wrap {
      position: fixed; bottom: 48px; left: 50%; transform: translateX(-50%);
      z-index: 100; max-width: 80%; pointer-events: none; text-align: center;
    }
    #subtitle {
      display: inline-block; padding: 12px 28px; border-radius: 16px;
      background: rgba(0,0,0,0.65); backdrop-filter: blur(12px);
      color: #f0f0f0; font-size: 18px; line-height: 1.6; letter-spacing: 0.3px;
      opacity: 0; transition: opacity 0.4s ease;
    }
    #subtitle.visible { opacity: 1; }

    /* ── Emotion badge ── */
    #emotion-badge {
      position: fixed; top: 20px; right: 24px; z-index: 100;
      padding: 6px 18px; border-radius: 20px;
      background: rgba(0,200,150,0.2); backdrop-filter: blur(8px);
      color: #66ffcc; font-size: 14px; font-weight: 500; letter-spacing: 1px;
      opacity: 0; transition: opacity 0.3s ease;
    }
    #emotion-badge.visible { opacity: 1; }

    /* ── Status indicator ── */
    #status {
      position: fixed; top: 20px; left: 24px; z-index: 100;
      padding: 4px 14px; border-radius: 12px; font-size: 12px;
      background: rgba(0,0,0,0.4); color: #888; backdrop-filter: blur(6px);
    }
    #status.connected { color: #66ffcc; }
    #status.speaking  { color: #ffaa44; }

    /* ── Floating control panel ── */
    #ctrl-toggle {
      position: fixed; bottom: 16px; right: 16px; z-index: 200;
      width: 40px; height: 40px; border-radius: 50%;
      background: rgba(255,255,255,0.12); backdrop-filter: blur(8px);
      border: 1px solid rgba(255,255,255,0.15); color: #ccc;
      font-size: 20px; cursor: pointer; display: flex;
      align-items: center; justify-content: center;
      transition: background 0.2s, transform 0.2s;
    }
    #ctrl-toggle:hover { background: rgba(255,255,255,0.22); transform: scale(1.1); }

    #ctrl-panel {
      position: fixed; bottom: 68px; right: 16px; z-index: 200;
      width: 240px; padding: 16px 18px;
      background: rgba(15,18,25,0.85); backdrop-filter: blur(16px);
      border-radius: 16px; border: 1px solid rgba(255,255,255,0.08);
      color: #ddd; font-size: 13px;
      transform: translateY(8px); opacity: 0; pointer-events: none;
      transition: opacity 0.25s ease, transform 0.25s ease;
    }
    #ctrl-panel.open { opacity: 1; transform: translateY(0); pointer-events: all; }

    #ctrl-panel label {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 12px; gap: 8px;
    }
    #ctrl-panel label span { flex-shrink: 0; min-width: 52px; }
    #ctrl-panel label small { color: #888; min-width: 36px; text-align: right; font-size: 12px; }

    #ctrl-panel input[type=range] {
      flex: 1; height: 4px; -webkit-appearance: none; appearance: none;
      background: rgba(255,255,255,0.15); border-radius: 2px; outline: none;
    }
    #ctrl-panel input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none; width: 14px; height: 14px; border-radius: 50%;
      background: #66ffcc; cursor: pointer;
    }
  </style>
</head>
<body>
  <canvas id="live2d-canvas"></canvas>
  <div id="subtitle-wrap"><div id="subtitle"></div></div>
  <div id="emotion-badge"></div>
  <div id="status">connecting...</div>

  <!-- Floating controls -->
  <div id="ctrl-toggle" onclick="toggleCtrlPanel()" title="设置">⚙</div>
  <div id="ctrl-panel">
    <label>
      <span>模型大小</span>
      <input type="range" id="scale-slider" min="0.05" max="1.0" step="0.01" value="0.3"
             oninput="onScaleChange(this.value)">
      <small id="scale-val">0.30</small>
    </label>
    <label>
      <span>音量</span>
      <input type="range" id="volume-slider" min="0" max="1" step="0.01" value="1"
             oninput="onVolumeChange(this.value)">
      <small id="volume-val">100%</small>
    </label>
  </div>

  <!-- Live2D Cubism 4 Core (must load first) -->
  <script src="https://cubism.live2d.com/sdk-web/cubismcore/live2dcubismcore.min.js"></script>
  <!-- PixiJS v6 (compatible with pixi-live2d-display) -->
  <script src="https://cdn.jsdelivr.net/npm/pixi.js@6.5.10/dist/browser/pixi.min.js"></script>
  <!-- pixi-live2d-display (Cubism 4) -->
  <script src="https://cdn.jsdelivr.net/npm/pixi-live2d-display@0.4.0/dist/cubism4.min.js"></script>

  <script>
    // ============================================================
    //  Global state
    // ============================================================
    let pixiApp = null;
    let currentModel = null;
    let audioContext = null;
    let analyserNode = null;
    let gainNode = null;  // For volume control
    let lastAudioVersion = 0;
    let isSpeaking = false;
    let currentEmotion = 'neutral';
    let modelConfig = null;
    let currentScale = 0.3;
    let currentVolume = 1.0;
    let mouthValueForTicker = 0;  // Written by audio analysis, read by model update hook

    const subtitleEl  = document.getElementById('subtitle');
    const emotionEl   = document.getElementById('emotion-badge');
    const statusEl    = document.getElementById('status');

    // ============================================================
    //  Control panel functions
    // ============================================================
    function toggleCtrlPanel() {
      document.getElementById('ctrl-panel').classList.toggle('open');
    }

    function onScaleChange(val) {
      currentScale = parseFloat(val);
      document.getElementById('scale-val').textContent = currentScale.toFixed(2);
      if (currentModel) {
        currentModel.scale.set(currentScale);
      }
    }

    function onVolumeChange(val) {
      currentVolume = parseFloat(val);
      document.getElementById('volume-val').textContent = Math.round(currentVolume * 100) + '%';
      if (gainNode) {
        gainNode.gain.value = currentVolume;
      }
    }

    // Default emotion → expression index mapping (overridden by model config)
    const DEFAULT_EMOTION_MAP = {
      neutral: 0, joy: 3, sadness: 1, anger: 2,
      surprise: 3, fear: 1, disgust: 2, smirk: 3
    };

    // ============================================================
    //  1. Initialize PixiJS
    // ============================================================
    function initPixi() {
      const canvas = document.getElementById('live2d-canvas');
      pixiApp = new PIXI.Application({
        view: canvas,
        resizeTo: window,
        backgroundAlpha: 0,  // transparent background
        antialias: true,
        autoDensity: true,
        resolution: window.devicePixelRatio || 1,
      });
    }

    // ============================================================
    //  2. Load Live2D Model
    // ============================================================
    async function loadModel(modelUrl, config) {
      if (currentModel) {
        pixiApp.stage.removeChild(currentModel);
        currentModel.destroy();
        currentModel = null;
      }

      try {
        const model = await PIXI.live2d.Live2DModel.from(modelUrl, {
          autoInteract: false,
        });

        // Apply scale and position
        const scale = config.kScale || 0.3;
        currentScale = scale;
        model.scale.set(scale);
        model.anchor.set(0.5, 0.5);
        model.x = pixiApp.screen.width / 2 + (config.initialXshift || 0);
        model.y = pixiApp.screen.height / 2 + (config.initialYshift || 0);

        // Sync scale slider with model config
        document.getElementById('scale-slider').value = scale;
        document.getElementById('scale-val').textContent = scale.toFixed(2);

        // Enable mouse tracking (eyes follow cursor)
        model.interactive = true;
        pixiApp.stage.addChild(model);
        currentModel = model;

        // Reset mouth param detection for new model
        activeMouthParam = null;

        // === Enumerate all model parameters for debugging ===
        try {
          const coreModel = model.internalModel.coreModel;
          const count = coreModel.getParameterCount();
          const ids = [];
          for (let i = 0; i < count; i++) {
            ids.push(coreModel.getParameterIds()[i]);
          }
          console.log('[live2d] Model parameters (' + count + '):', ids.join(', '));
        } catch (e) {
          console.warn('[live2d] Could not enumerate parameters:', e);
        }

        // === Log available expressions and motions for debugging ===
        try {
          const settings = model.internalModel.settings;
          const exprs = settings.expressions ? settings.expressions.map(e => e.Name || e.name || e.file) : 'none';
          const motions = settings.motions ? Object.keys(settings.motions) : 'none';
          console.log('[live2d] Expressions:', exprs);
          console.log('[live2d] Motions groups:', motions);
        } catch (e) {}

        // === Hook into model update for proper lip sync timing ===
        // The key: we must set mouth param AFTER motionManager.update() runs,
        // otherwise idle motions will overwrite our value every frame.
        // And then we MUST call coreModel.update() again to apply the new parameter to vertices.
        const origUpdate = model.internalModel.update.bind(model.internalModel);
        model.internalModel.update = function(dt, now) {
          origUpdate(dt, now);
          
          let modified = false;
          if (isSpeaking && mouthValueForTicker > 0) {
            const p = detectMouthParam();
            if (p) {
              try {
                this.coreModel.setParameterValueById(p, mouthValueForTicker);
                modified = true;
              } catch (e) {}
            }
          }
          
          if (modified && typeof this.coreModel.update === 'function') {
            this.coreModel.update();
          }
        };

        // Start idle motion if defined
        const idleGroup = config.idleMotionGroupName || 'Idle';
        try { model.motion(idleGroup, 0, 'idle'); } catch (e) { /* no idle motion */ }

        statusEl.textContent = 'connected';
        statusEl.className = 'connected';
        console.log('[live2d] Model loaded:', modelUrl);
      } catch (err) {
        statusEl.textContent = 'model error';
        console.error('[live2d] Failed to load model:', err);
      }
    }

    // ============================================================
    //  3. Mouse Tracking (eye follow)
    // ============================================================
    function setupMouseTracking() {
      window.addEventListener('mousemove', (e) => {
        if (!currentModel) return;
        // pixi-live2d-display expects focus point in model-local coords
        const rect = pixiApp.view.getBoundingClientRect();
        currentModel.focus(e.clientX - rect.left, e.clientY - rect.top);
      });
    }

    // ============================================================
    //  4. Lip Sync (Audio amplitude → ParamMouthOpenY)
    // ============================================================
    function ensureAudioContext() {
      if (!audioContext) {
        audioContext = new (window.AudioContext || window.webkitAudioContext)();
        analyserNode = audioContext.createAnalyser();
        analyserNode.fftSize = 256;
        analyserNode.smoothingTimeConstant = 0.6;
        // Create gain node for volume control
        gainNode = audioContext.createGain();
        gainNode.gain.value = currentVolume;
        gainNode.connect(audioContext.destination);
      }
    }

    // Common mouth parameter IDs across different Live2D models
    const MOUTH_PARAMS = ['ParamMouthOpenY', 'PARAM_MOUTH_OPEN_Y', 'ParamMouthOpen', 'Param_MouthOpenY'];
    let activeMouthParam = null;

    function detectMouthParam() {
      if (!currentModel) return null;
      if (activeMouthParam) return activeMouthParam;
      try {
        const coreModel = currentModel.internalModel.coreModel;
        for (const p of MOUTH_PARAMS) {
          try {
            // Try to read the parameter — if it doesn't throw, it exists
            const val = coreModel.getParameterValueById(p);
            if (val !== undefined) {
              activeMouthParam = p;
              console.log('[live2d] Mouth parameter found:', p);
              return p;
            }
          } catch (e) { /* try next */ }
        }
        // Fallback: try the first one anyway
        activeMouthParam = MOUTH_PARAMS[0];
        console.warn('[live2d] No known mouth param found, using default:', activeMouthParam);
      } catch (e) {}
      return activeMouthParam;
    }

    async function playAudioWithLipSync(audioUrl) {
      ensureAudioContext();
      if (audioContext.state === 'suspended') await audioContext.resume();

      try {
        console.log('[live2d] Fetching audio:', audioUrl);
        const response = await fetch(audioUrl);
        if (!response.ok) {
          console.error('[live2d] Audio fetch failed:', response.status);
          return;
        }
        const arrayBuffer = await response.arrayBuffer();
        const audioBuffer = await audioContext.decodeAudioData(arrayBuffer);
        console.log('[live2d] Audio decoded, duration:', audioBuffer.duration.toFixed(2) + 's');

        // Create fresh analyser for this playback
        const localAnalyser = audioContext.createAnalyser();
        localAnalyser.fftSize = 256;
        localAnalyser.smoothingTimeConstant = 0.5;

        const source = audioContext.createBufferSource();
        source.buffer = audioBuffer;
        // Audio chain: source → analyser (for lip sync) → gain (for volume) → speakers
        source.connect(localAnalyser);
        localAnalyser.connect(gainNode);

        isSpeaking = true;
        mouthValueForTicker = 0;
        statusEl.textContent = 'speaking';
        statusEl.className = 'speaking';
        source.start(0);

        // Detect mouth param early so it's ready for the ticker
        detectMouthParam();
        // Use time-domain data for more responsive amplitude detection
        const dataArray = new Uint8Array(localAnalyser.fftSize);
        let smoothedValue = 0;

        function updateMouth() {
          if (!isSpeaking) return;

          localAnalyser.getByteTimeDomainData(dataArray);
          // Calculate RMS amplitude from waveform
          let sumSq = 0;
          for (let i = 0; i < dataArray.length; i++) {
            const v = (dataArray[i] - 128) / 128;
            sumSq += v * v;
          }
          let rawValue = Math.sqrt(sumSq / dataArray.length);

          // Smooth with lerp and amplify
          smoothedValue += (rawValue - smoothedValue) * 0.4;
          mouthValueForTicker = Math.min(1, smoothedValue * 2.5);

          requestAnimationFrame(updateMouth);
        }
        requestAnimationFrame(updateMouth);

        source.onended = () => {
          isSpeaking = false;
          mouthValueForTicker = 0;
          statusEl.textContent = 'connected';
          statusEl.className = 'connected';
          source.disconnect();
          localAnalyser.disconnect();
          console.log('[live2d] Audio playback finished');
        };
      } catch (err) {
        console.error('[live2d] Audio playback error:', err);
        isSpeaking = false;
        mouthValueForTicker = 0;
      }
    }

    // ============================================================
    //  5. Expression / Emotion system
    // ============================================================
    function applyEmotion(emotion) {
      if (!currentModel || emotion === currentEmotion) return;
      currentEmotion = emotion;

      emotionEl.textContent = emotion;
      emotionEl.className = 'visible';
      setTimeout(() => { emotionEl.className = ''; }, 3000);

      const emotionMap = (modelConfig && modelConfig.emotionMap) || DEFAULT_EMOTION_MAP;
      const exprIndex = emotionMap[emotion.toLowerCase()];
      if (exprIndex !== undefined && exprIndex !== null) {
        try { currentModel.expression(exprIndex); } catch (e) {
          console.warn('[live2d] Expression not available:', exprIndex);
        }
      }
    }

    // ============================================================
    //  6. Subtitle display
    // ============================================================
    function showSubtitle(text) {
      if (!text) {
        subtitleEl.className = '';
        return;
      }
      subtitleEl.textContent = text;
      subtitleEl.className = 'visible';
    }

    // ============================================================
    //  7. Backend state polling
    // ============================================================
    async function pollState() {
      try {
        const res = await fetch('/api/live2d/state');
        if (!res.ok) return;
        const state = await res.json();

        // New audio available?
        if (state.audio_version > lastAudioVersion && !isSpeaking) {
          console.log('[live2d] New audio detected, version:', state.audio_version, 'emotion:', state.emotion);
          lastAudioVersion = state.audio_version;
          // Apply emotion before speaking
          if (state.emotion) applyEmotion(state.emotion);
          // Show subtitle
          showSubtitle(state.reply_text || '');
          // Play audio with lip sync
          const audioUrl = `/api/live2d/audio?v=${state.audio_version}`;
          await playAudioWithLipSync(audioUrl);
          // Hide subtitle after speech + 2s delay
          setTimeout(() => showSubtitle(''), 2000);
        }
      } catch (e) {
        // Backend not ready yet
      }
    }

    // ============================================================
    //  8. Window resize handler
    // ============================================================
    function setupResize() {
      window.addEventListener('resize', () => {
        if (currentModel && modelConfig) {
          currentModel.x = pixiApp.screen.width / 2 + (modelConfig.initialXshift || 0);
          currentModel.y = pixiApp.screen.height / 2 + (modelConfig.initialYshift || 0);
        }
      });
    }

    // ============================================================
    //  9. Boot sequence
    // ============================================================
    async function boot() {
      initPixi();
      setupMouseTracking();
      setupResize();

      // Fetch Live2D config from backend
      try {
        const res = await fetch('/api/live2d/models');
        if (!res.ok) throw new Error('Failed to fetch models');
        const data = await res.json();

        if (data.current && data.current.url) {
          modelConfig = data.current;
          await loadModel(data.current.url, data.current);
        } else if (data.models && data.models.length > 0) {
          modelConfig = data.models[0];
          await loadModel(data.models[0].url, data.models[0]);
        } else {
          statusEl.textContent = 'no model found';
          console.warn('[live2d] No models available. Put models in live2d-models/ directory.');
        }
      } catch (err) {
        statusEl.textContent = 'error';
        console.error('[live2d] Boot error:', err);
      }

      // Start state polling loop (every 300ms)
      setInterval(pollState, 300);
    }

    // Ensure user interaction for AudioContext (browser policy)
    // Listen on multiple events to maximize chance of activation
    function activateAudio() {
      ensureAudioContext();
      if (audioContext.state === 'suspended') {
        audioContext.resume().then(() => {
          console.log('[live2d] AudioContext activated');
          statusEl.textContent = statusEl.textContent === 'connecting...' ? 'connected' : statusEl.textContent;
        });
      }
    }
    // Use capture phase so PIXI doesn't swallow the event before we activate audio
    window.addEventListener('pointerdown', activateAudio, { capture: true });
    window.addEventListener('keydown', activateAudio, { capture: true, once: true });
    window.addEventListener('DOMContentLoaded', () => {
      boot();
      // Try to activate immediately (works if user already interacted with the page)
      activateAudio();
    });
  </script>
</body>
</html>
